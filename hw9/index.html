<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 9</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button class="buttonMenu fa fa-bars"></button>
    <img
      src="https://cdn.imgchest.com/files/3yrgczd8n4z.png"
      style="position: absolute; top: 0; left: 0; z-index: -1"
    />
    <div class="container">
      <div class="box1">1</div>
      <div class="box2">2</div>
      <div class="box3">3</div>
      <div class="box4">4</div>
      <div class="box5">
        <ul>
          <li class="banks">Банки</li>
          <li class="credits">Кредиты</li>
          <li class="deposits">Вклады</li>
          <li class="cards">Карты</li>
          <li class="micro">Микрокредиты</li>
          <li class="more">Ещё</li>
        </ul>
      </div>
      <div class="box6">6</div>
    </div>

    <script>
      const buttonMenu = document.querySelector(".buttonMenu");
      const boxFive = document.querySelector(".box5");

      buttonMenu.addEventListener("click", () => {
        console.log("yes, hamburger clicked!");
        buttonMenu.classList.toggle("mobileMenu");
        boxFive.classList.toggle("mobileMenu");
      });
    </script>
  </body>
</html>
